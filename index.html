<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Sign-up Form</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">

            <!--Container for Image Sidebar-->
            <div class="left-side">
                <div class="logo-box">
                    <img src="images/odin-lined.png" alt="Odin Logo">
                    <h1>ODIN</h1>
                </div>
            </div>

            <!--Conatiner for Right-section-->
            <div class="right-side">

                <div class="intro">
                    <p>This is not a real online service! You know you need something like this in your
                       life to help you realize your deepest dreams.<br>
                       Sign up <i>now</i> to get started.
                    </p>
                    <br>

                    <p> You <i>know</i> you want to.</p>
                    <br>
                </div>

                <div class="form-section">
                    <h2>Let's do this!</h2>

                    <form>

                        <div class="row">
                            <div class="input-group">
                                <label>FIRST NAME</label>
                                <input type="text">
                            </div>

                            <div class="input-group">
                                <label>LAST NAME</label>
                                <input type="text">
                            </div>
                        </div>

                        <div class="row">
                            <div class="input-group">
                                <label>EMAIL</label>
                                <input type="email">
                            </div>

                            <div class="input-group">
                                <label>PHONE NUMBER</label>
                                <input type="tel">
                            </div>
                        </div>

                        <div class="row">
                            <div class="input-group">
                                <label>PASSWORD</label>
                                <input type="password" required minlength="8">
                            </div>

                            <div class="input-group">
                                <label>CONFIRM PASSWORD</label>
                                <input type="password" required minlength="8">
                            </div>
                        </div>

                    </form>
                    
                </div>

                <div class="bottom">
                    <button>Create Account</button>

                    <p>Already have an account?<a href="#">Log in</a></p>
                </div>
            </div>

        </div>
    </body>
</html>
